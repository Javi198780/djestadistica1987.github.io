<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Ejercicios de Bioestadística</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:40px;
}

.contenedor{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    color:#2c3e50;
    text-align:center;
}

p{
    color:#555;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    background:#1976d2;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#125ca1;
}

.info{
    margin-top:20px;
    padding:15px;
    background:#eef5ff;
    border-left:5px solid #1976d2;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>📊 Generador de Ejercicios de Bioestadística</h1>

<p>
Este sistema genera automáticamente un conjunto de datos para que el estudiante realice el análisis estadístico en Excel.
</p>

<label>Nombre del estudiante</label>

<input
type="text"
id="nombre"
placeholder="Ingrese su nombre">

<button onclick="generarExcel()">
📥 Descargar ejercicio
</button>

<div class="info">
Se generarán entre 300 y 1000 registros aleatorios de pacientes.
</div>

</div>

<script>

function generarExcel(){

    let nombre =
    document.getElementById("nombre").value.trim();

    if(nombre===""){
        alert("Ingrese el nombre del estudiante.");
        return;
    }

    // ==================================
    // DATOS
    // ==================================

    let datos = [];

    let cantidad =
    Math.floor(Math.random()*701)+300;

    for(let i=1;i<=cantidad;i++){

       let sexo =
Math.random() < 0.5 ? "Masculino" : "Femenino";

let peso;

if(sexo==="Masculino"){
    peso = Math.floor(Math.random()*71)+55; // 55-125 kg
}else{
    peso = Math.floor(Math.random()*56)+45; // 45-100 kg
}
        let edad =
        Math.floor(Math.random()*63)+18;


      let talla;

      if(sexo === "Masculino"){
    talla = Number((1.60 + Math.random()*0.30).toFixed(2)); // 1.60-1.90
       }else{
    talla = Number((1.45 + Math.random()*0.30).toFixed(2)); // 1.45-1.75
       }

        let imc =
        peso/(talla*talla);

        let efectoSexo =
sexo === "Masculino" ? 4 : 0;


      let servicio =
["Emergencia","Hospitalización","Consulta Externa"]
[Math.floor(Math.random()*3)];

let efectoServicio = 0;

if(servicio === "Emergencia"){
    efectoServicio = 8;
}
else if(servicio === "Hospitalización"){
    efectoServicio = 4;
}

        
let presion =
Math.round(
    90 +
    edad*0.40 +
    imc*0.60 +
    efectoSexo +
    efectoServicio +
    (Math.random()*20-10)
);

       

     datos.push({

    "Paciente":i,

    "Sexo":sexo,

    "Edad (años)":edad,

    "Peso (kg)":peso,

    "Talla (m)":talla,

    "IMC":Number(imc.toFixed(2)),
         
     "Servicio": servicio,

    "Presión Sistólica (mmHg)":presion


        });

    }

    // ==================================
    // HOJA DATOS
    // ==================================

    const hojaDatos =
    XLSX.utils.json_to_sheet(datos);

    // ==================================
    // CASO
    // ==================================

    const caso = [

        ["CASO DE INVESTIGACIÓN EN ENFERMERÍA"],

        [""],

        ["Nombre del estudiante", nombre],

        [""],

        ["Contexto"],

        ["Durante una campaña de prevención cardiovascular se registró información de varios pacientes."],

        ["Se recopiló la edad, peso, talla, IMC y presión arterial sistólica."],

        ["La información será utilizada para realizar un análisis estadístico y explorar posibles relaciones entre las variables."],

        [""],

        ["Objetivo"],

        ["Analizar estadísticamente las características de los pacientes atendidos."]
    ];

    const hojaCaso =
    XLSX.utils.aoa_to_sheet(caso);

    // ==================================
    // ACTIVIDADES
    // ==================================

    const preguntas = [

        ["ACTIVIDADES PROPUESTAS"],

        [""],

        ["1. Estadística descriptiva"],

        ["Calcule para Edad, Peso, IMC y Presión Arterial:"],

        ["- Número de observaciones"],
        ["- Media"],
        ["- Mediana"],
        ["- Moda"],
        ["- Rango"],
        ["- Varianza"],
        ["- Desviación estándar"],
        ["- Coeficiente de variación"],

        [""],

        ["2. Valores extremos"],

        ["Determine el valor máximo y mínimo de cada variable."],

        [""],

        ["3. Tablas de frecuencia"],

        ["Construya una tabla de frecuencia para la Edad."],

        ["Construya una tabla de frecuencia para la Presión Arterial."],

        [""],

        ["4. Gráficos"],

        ["- Histograma de Edad"],
        ["- Histograma de IMC"],
        ["- Histograma de Presión Arterial"],

        [""],

        ["5. Correlación"],

        ["Determine la relación entre:"],

        ["- Edad y Presión Arterial"],
        ["- IMC y Presión Arterial"],

        ["Calcule el coeficiente de correlación de Pearson."],

        ["Interprete los resultados."],

        [""],

        ["6. Regresión lineal"],

        ["Obtenga una ecuación de regresión para predecir la presión arterial."],

        ["Interprete la pendiente del modelo."],

        [""],

        ["7. Conclusiones"],

        ["Redacte al menos tres conclusiones basadas en el análisis realizado."],

[""],
["8. Pruebas de hipótesis"],
[""],

["A. Prueba t de Student"],
["Compare la presión arterial media entre hombres y mujeres."],
["Formule las hipótesis H₀ y H₁."],
["Realice una prueba t para muestras independientes."],
["Interprete el valor p y concluya si existen diferencias significativas."],

[""],

["B. Prueba Chi-cuadrado"],
["Clasifique la presión arterial en Normal y Elevada."],
["Construya una tabla de contingencia entre Sexo y Categoría de Presión."],
["Formule las hipótesis H₀ y H₁."],
["Realice una prueba Chi-cuadrado de independencia."],
["Interprete el valor p y concluya si existe asociación entre las variables."],

[""],

["C. Nivel de significancia"],
["Utilice α = 0.05 para todas las pruebas."],
["Indique si se rechaza o no la hipótesis nula."],

        [""],
["9. Análisis adicional"],
["Clasifique el IMC en Bajo peso, Normal, Sobrepeso y Obesidad."],
["Construya una tabla de frecuencias para las categorías de IMC."],
["Analice la relación entre IMC y Presión Arterial."],
["Determine si existe evidencia estadística de asociación."],

        ["10. Intervalos de confianza"],
["Calcule un IC del 95% para la media de la presión arterial."],
["Interprete el resultado."],

        ["11. Prueba de normalidad"],
["Evalúe si la variable presión arterial presenta distribución normal."],
["Interprete los resultados."],
        ["13. ANOVA"],
["Compare la presión arterial entre los diferentes servicios hospitalarios."],
["Formule H₀ y H₁."],
["Realice un ANOVA de una vía."],
["Interprete el valor p."],
["Determine si existen diferencias significativas entre los grupos."],
        ["14. Muestreo"],
["Determine el tamaño de la muestra utilizada."],
["Explique si la muestra representa adecuadamente a la población."],
["Indique las ventajas y limitaciones del tamaño muestral obtenido."],
["Describa un método de muestreo apropiado para este estudio."]
        
    ];

    const hojaPreguntas =
    XLSX.utils.aoa_to_sheet(preguntas);

    // ==================================
    // CREAR LIBRO
    // ==================================

    const wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        hojaDatos,
        "Datos"
    );

    XLSX.utils.book_append_sheet(
        wb,
        hojaCaso,
        "Caso"
    );

    XLSX.utils.book_append_sheet(
        wb,
        hojaPreguntas,
        "Actividades"
    );

    // ==================================
    // DESCARGAR
    // ==================================

    XLSX.writeFile(
        wb,
        "Ejercicio_Bioestadistica_Enfermeria.xlsx"
    );

}

</script>

</body>
</html>
